const SYS=`You are the game master for a geopolitical simulation. The player is MBZ, President of the UAE, navigating the 2026 OPEC crisis and Iran war.

CRITICAL RULES:
- Consequences should be SURPRISING but logical — second and third-order effects
- Leaders respond IN CHARACTER:
  * Trump: bombastic Truth Social, transactional, ALL CAPS emphasis, exclamation marks
  * MBS: cold, calculated, anonymous Reuters/Bloomberg sources only
  * Putin: chess-player, formal, menacing
  * Xi: Xinhua formal, mutual benefit, sovereignty
  * Iran: revolutionary rhetoric, resistance axis
  * Modi: partnership, 1.4B people
- Include UNEXPECTED actors and consequences
- Model FULL SPECTRUM: oil, military, Yemen, Gulf rivalries, tech, currency, climate, domestic politics
- Good decisions sometimes backfire. Allies sometimes betray.
- Some reactions reveal HIDDEN consequences

ALWAYS respond with ONLY valid JSON. No markdown fences, no preamble, no explanation outside the JSON.`;

let API_KEY="";

async function callAPI(prompt){
  try{
    const url="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key="+API_KEY;
    const body={
      system_instruction:{parts:[{text:SYS}]},
      contents:[{role:"user",parts:[{text:prompt}]}],
      generationConfig:{maxOutputTokens:4000,temperature:1.0}
    };
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok){
      const err=await res.text();
      throw new Error("Gemini "+res.status+": "+err);
    }
    const data=await res.json();
    const text=((data.candidates||[])[0]?.content?.parts||[]).map(p=>p.text||"").join("");
    if(!text) throw new Error("Empty response");
    const clean=text.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim();
    return JSON.parse(clean);
  }catch(e){console.error("API fail:",e);throw e;}
}

function stStr(s){
  return "Oil: $"+fmt(s.price,0)+", UAE prod: "+fmt(s.uaeProduction)+"M, OPEC: "+(s.uaeInOpec?"in":"OUT")+", War: "+s.warActive+", Hormuz: "+(s.hormuzDisruption*100).toFixed(0)+"%, Fujairah: "+(s.fujairahStarted?s.fujairahProgress+"%":"no")+", Saudi: "+Math.round(s.saudiRelation)+", US: "+Math.round(s.usRelation)+", Iran: "+Math.round(s.iranThreat)+", OPEC coh: "+Math.round(s.opecCohesion)+", Approval: "+Math.round(s.publicApproval)+", Investor: "+Math.round(s.investorConf)+", China: "+Math.round(s.chinaRelation)+", India: "+Math.round(s.indiaRelation)+", Yemen: "+Math.round(s.yemenInfluence)+", GCC: "+Math.round(s.gccUnity)+", Military: "+Math.round(s.militaryReadiness)+", Kaz: "+s.kazExit;
}

async function genTurn(s){
  const hist=s.history.map(h=>h.month+": "+h.choice).join("\n")||"None yet";
  return await callAPI("Generate turn "+(s.turn+1)+' for "'+getMonth(s.turn)+'".\n\nSTATE: '+stStr(s)+'\nHISTORY:\n'+hist+'\n\nReturn JSON:\n{"headline":"dramatic headline","briefing":"2-3 paragraphs referencing prior decisions with surprises","intel":"1-2 paragraphs classified intel with specifics","choices":[{"id":"x","label":"Short label","icon":"emoji","desc":"Description","tags":[{"text":"Impact","type":"green|red|yellow|blue"}],"effects":{"price":0,"uaeProduction":0,"hormuzDisruption":0,"saudiRelation":0,"usRelation":0,"iranThreat":0,"opecCohesion":0,"publicApproval":0,"investorConf":0,"chinaRelation":0,"indiaRelation":0,"yemenInfluence":0,"gccUnity":0,"militaryReadiness":0}}],"tickerItems":[{"text":"headline","color":"#hex"}],"events":[{"text":"event","type":"bad|good|neutral"}]}\n\n3-4 choices with GENUINE tradeoffs. One hidden downside. Effects are deltas (-20 to +20). 3-5 ticker items, 1-3 events. Dramatically different based on history.');
}

async function genReactions(s,label,desc){
  const hist=s.history.map(h=>h.month+": "+h.choice).join("\n");
  return await callAPI('UAE decided: "'+label+'" — '+desc+'\n\nSTATE: '+stStr(s)+'\nHISTORY:\n'+hist+'\n\nGenerate 4-7 leader reactions. Leaders: uae,saudi,usa,iran,russia,china,opec,india,uk,kazakhstan,turkey,france,japan,iraq,yemen_houthi,israel\nFormats: truth_social,official,press_release,press_conference,state_media,saudi_press,reuters_source,xinhua,wam,joint,telegram,al_jazeera\n\nInclude at least one SURPRISING reaction. Return JSON array:\n[{"leader":"id","text":"in-character quote","tone":"tone","format":"format"}]');
}

async function genEnding(s){
  const hist=s.history.map(h=>h.month+": "+h.choice).join("\n");
  return await callAPI('Simulation complete.\nSTATE: '+stStr(s)+'\nDECISIONS:\n'+hist+'\n\nReturn JSON:\n{"narrative":"3-4 paragraph historian summary. Specific consequences. Successes AND failures.","legacy_title":"Evocative title","verdict":"One sentence verdict."}');
}

function App(){
  const[state,setState]=useState(INIT);
  const[turnData,setTurnData]=useState(null);
  const[prev,setPrev]=useState({});
  const[choiceMade,setChoiceMade]=useState(null);
  const[showRx,setShowRx]=useState(false);
  const[loading,setLoading]=useState(false);
  const[loadMsg,setLoadMsg]=useState("");
  const[error,setError]=useState(null);
  const[endData,setEndData]=useState(null);
  const[keyInput,setKeyInput]=useState("");
  const ref=useRef(null);

  useEffect(()=>{if(ref.current)ref.current.scrollIntoView({behavior:"smooth"})},[state.phase,showRx,turnData,loading]);

  const msgs=["Intercepting diplomatic cables...","Analyzing satellite imagery...","Monitoring oil futures...","Scanning Truth Social...","Briefing NSC...","Assessing threat vectors...","Decrypting IRGC comms...","Checking Hormuz lanes..."];
  const lm=()=>msgs[Math.floor(Math.random()*msgs.length)];

  const submitKey=()=>{
    if(keyInput.trim().startsWith("AIza")||keyInput.trim().length>20){
      API_KEY=keyInput.trim();
      setState(s=>({...s,phase:"intro"}));
    }
  };

  const startGame=async()=>{
    setLoading(true);setLoadMsg(lm());setError(null);
    const data=await genTurn({...INIT,turn:0,phase:"briefing"});
    if(data&&data.headline){
      setTurnData(data);
      setState(s=>({...s,phase:"briefing",tickerItems:data.tickerItems||[],events:data.events||[]}));
    }else{
      setError(""+e.message);
    }
    setLoading(false);
  };

  const makeChoice=async(choice)=>{
    setLoading(true);setLoadMsg(lm());setError(null);
    setPrev({saudiRelation:state.saudiRelation,usRelation:state.usRelation,iranThreat:state.iranThreat,opecCohesion:state.opecCohesion,publicApproval:state.publicApproval,investorConf:state.investorConf,chinaRelation:state.chinaRelation,indiaRelation:state.indiaRelation,yemenInfluence:state.yemenInfluence,gccUnity:state.gccUnity,militaryReadiness:state.militaryReadiness});
    const eff=choice.effects||{};
    const ns={...state};
    ["price","uaeProduction","hormuzDisruption","saudiRelation","usRelation","iranThreat","opecCohesion","publicApproval","investorConf","chinaRelation","indiaRelation","yemenInfluence","gccUnity","militaryReadiness"].forEach(k=>{
      const mx=k==="price"?200:k==="uaeProduction"?5:k==="hormuzDisruption"?1:100;
      const mn=k==="price"?30:k==="uaeProduction"?1:0;
      ns[k]=clamp((ns[k]||0)+(eff[k]||0),mn,mx);
    });
    if(choice.label&&choice.label.toLowerCase().includes("leave opec"))ns.uaeInOpec=false;
    if(choice.label&&choice.label.toLowerCase().includes("fujairah")){ns.fujairahStarted=true;ns.fujairahProgress=clamp(ns.fujairahProgress+30,0,100);}
    if(ns.fujairahStarted)ns.fujairahProgress=clamp(ns.fujairahProgress+15,0,100);
    if(ns.turn>=1)ns.warActive=true;
    if(ns.turn>=9)ns.kazExit=true;
    ns.history=[...state.history,{month:getMonth(state.turn),choice:choice.label}];

    const reactions=await genReactions(ns,choice.label,choice.desc);
    if(reactions&&Array.isArray(reactions)){
      setChoiceMade(choice);setState({...ns,phase:"reactions",reactions});setShowRx(false);
      setTimeout(()=>setShowRx(true),300);
    }else{setError(""+e.message);setState(ns);}
    setLoading(false);
  };

  const nextTurn=async()=>{
    setChoiceMade(null);setShowRx(false);setError(null);
    if(state.turn+1>=MAX_TURNS){
      setLoading(true);setLoadMsg("Writing the history books...");
      const ending=await genEnding(state);
      setEndData(ending);setState(s=>({...s,phase:"end"}));setLoading(false);
    }else{
      setLoading(true);setLoadMsg(lm());
      const next={...state,turn:state.turn+1};
      const data=await genTurn(next);
      if(data&&data.headline){setTurnData(data);setState({...next,phase:"briefing",tickerItems:data.tickerItems||[],events:data.events||[]});}
      else{setError(""+e.message);}
      setLoading(false);
    }
  };

  const pc=state.price>110?"#e85d3a":state.price>85?"#ca8a3a":"#4aad6a";
  const rev=state.uaeProduction*clamp(state.price,30,200)*(1-state.hormuzDisruption*0.5)*365/1000;

  const h=React.createElement;

  // ── KEY SCREEN ──
  if(state.phase==="key"){
    return h("div",{id:"app"},
      h("div",{style:{position:"fixed",inset:0,background:"#0c0a08",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
        h("div",{style:{background:"#12100d",border:"1px solid #2a2520",borderRadius:16,padding:32,maxWidth:480,width:"100%",animation:"slideUp .5s ease"}},
          h("div",{style:{fontSize:8,fontFamily:"'JetBrains Mono',monospace",color:"#c9a84c",letterSpacing:3,marginBottom:8}},"SECURE ACCESS"),
          h("h3",{style:{fontFamily:"'Playfair Display',serif",fontSize:22,marginBottom:12,color:"#e8d5b5"}},"API Key Required"),
          h("p",{style:{fontSize:12,color:"#8a7f70",lineHeight:1.7,marginBottom:16}},"This simulation uses Gemini to dynamically generate every scenario, reaction, and consequence. Enter your Google AI API key to begin. Your key is stored only in memory and never sent anywhere except the Google AI API."),
          h("input",{type:"password",placeholder:"AIzaSy...",value:keyInput,onChange:e=>setKeyInput(e.target.value),onKeyDown:e=>{if(e.key==="Enter")submitKey()},style:{width:"100%",padding:"12px 14px",background:"#0c0a08",border:"1px solid #2a2520",borderRadius:8,color:"#e0d5c5",fontFamily:"'JetBrains Mono',monospace",fontSize:12,outline:"none",marginBottom:12}}),
          h("button",{onClick:submitKey,style:{width:"100%",padding:12,background:keyInput.length>10?"#c9a84c":"#2a2520",color:keyInput.length>10?"#0c0a08":"#5a5040",border:"none",borderRadius:8,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:600,cursor:keyInput.length>10?"pointer":"default",letterSpacing:1}},"Connect & Begin"),
          h("p",{style:{fontSize:10,color:"#5a5040",marginTop:10,lineHeight:1.5}},"Get a key at aistudio.google.com. Uses gemini-2.0-flash-lite. Very low cost per full playthrough.")
        )
      )
    );
  }

  // ── HEADER ──
  const header=h("div",{style:{padding:"16px 20px 12px",borderBottom:"1px solid #1a1810",background:"linear-gradient(180deg,#12100d,#0c0a08)",position:"sticky",top:0,zIndex:50}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
      h("div",null,
        h("div",{style:{fontSize:7,fontFamily:"'JetBrains Mono',monospace",color:"#c9a84c",letterSpacing:3}},"CLASSIFIED — UAE NSC"),
        h("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900}},"THE OPEC CRISIS")
      ),
      state.phase!=="intro"&&h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"#6a5f50"}},"TURN "+(state.turn+1)+"/"+MAX_TURNS),

      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}},

    h("div",{style:{fontSize:7.5,fontFamily:"'JetBrains Mono',monospace",color:"#d45a5a",letterSpacing:3,marginBottom:12,animation:"slideUp .4s ease .2s both"}},"▎THE WORLD REACTS"),

        h("div",null,h("span",{style:{fontSize:9,color:"#c9a84c",fontFamily:"'JetBrains Mono',monospace"}},hh.month),h("span",{style:{fontSize:11,color:"#a09585",marginLeft:6}},hh.choice))

  return h("div",{id:"app"},header,ticker,h("div",{style:{padding:20}},loadUI,errUI,introUI,briefUI,rxUI,endUI,h("div",{ref})));
}
