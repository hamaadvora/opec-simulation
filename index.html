<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>THE OPEC CRISIS | V4.1 STABLE</title>
<link href="[https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap](https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap)" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0a08;color:#e0d5c5;font-family:'Georgia',serif;min-height:100vh;line-height:1.6}
  #app{max-width:760px;margin:0 auto;padding:20px}
  .card{background:#12100d;border:1px solid #2a2520;border-radius:12px;padding:20px;margin-bottom:15px;animation:slideUp 0.5s ease both}
  .btn{display:block;width:100%;text-align:left;background:#12100d;border:1px solid #2a2520;border-radius:12px;padding:16px;cursor:pointer;margin-bottom:10px;transition:all .2s;color:inherit}
  .btn:hover{border-color:#c9a84c;transform:translateY(-2px);background:#1a1814}
  .reaction-card{background:#141a18;padding:15px;border-radius:10px;margin-bottom:10px;border:1px solid #2a3a30;animation:slideUp 0.4s ease both}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .status-bar{height:8px;background:#1a1610;border-radius:4px;overflow:hidden;margin-top:4px}
</style></head><body><div id="app"></div>

<script src="[https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js](https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js](https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js](https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js)"></script>

<script type="text/babel">
const {useState, useEffect} = React;

// Secure API Configuration for Gemini 3 Flash
const API_URL = "[https://generativelanguage.googleapis.com/v1beta/openai/chat/completions](https://generativelanguage.googleapis.com/v1beta/openai/chat/completions)";
const MODEL_ID = "gemini-3-flash-preview"; 

function SBar({label, value, color}){
  return (
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10, color:"#8a8070", fontFamily:"'JetBrains Mono'"}}>{label}</div>
      <div className="status-bar">
        <div style={{width:`${Math.min(value, 100)}%`, height:"100%", background:color, transition:"width 1s"}} />
      </div>
    </div>
  );
}

function App(){
  const [phase, setPhase] = useState("key");
  const [apiKey, setApiKey] = useState("");
  const [state, setState] = useState({turn:1, saudi:65, us:70, threat:30});
  const [turnData, setTurnData] = useState(null);
  const [reactions, setReactions] = useState([]);
  const [loading, setLoading] = useState(false);

  async function callAI(prompt) {
    setLoading(true);
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: MODEL_ID,
          messages: [
            {role: "system", content: "You are a geopolitical game master. Return ONLY a valid JSON object. No markdown, no preamble."},
            {role: "user", content: prompt}
          ],
          response_format: { type: "json_object" }
        })
      });
      if(!res.ok) throw new Error("API Connection Failed");
      const json = await res.json();
      // Safety cleaning of AI response string
      let content = json.choices[0].message.content.replace(/```json/g, "").replace(/```/g, "").trim();
      return JSON.parse(content);
    } catch (e) { 
      alert("Critical Error: " + e.message); 
      return null; 
    } finally { setLoading(false); }
  }

  const startSim = async () => {
    const data = await callAI("January 2026. Oil $78. UAE is MBZ. Provide 'headline', 'briefing', and a 'choices' array (label, desc).");
    if(data) { setTurnData(data); setPhase("game"); }
  };

  const handleChoice = async (choice) => {
    setReactions([]); // Clear previous to prevent UI flicker
    const rx = await callAI(`The UAE chose: ${choice.label}. Provide a 'reactions' array of 5 leaders (leader, text).`);
    if(rx) { 
      setReactions(rx.reactions || []); 
      setPhase("reactions"); 
    }
  };

  if(phase === "key") return (
    <div style={{textAlign:"center", marginTop:100}} className="card">
      <h2 style={{fontFamily:"'Playfair Display'", marginBottom:20}}>UAE National Security Council</h2>
      <p style={{fontSize:12, color:"#8a7f70", marginBottom:20}}>Enter Gemini 3 API Key to Decrypt Mission</p>
      <input type="password" placeholder="AIza..." onChange={e=>setApiKey(e.target.value)} style={{padding:12, width:"100%", background:"#0c0a08", border:"1px solid #2a2520", color:"#fff", borderRadius:8, marginBottom:10}} />
      <button onClick={startSim} style={{width:"100%", padding:12, background:"#c9a84c", border:"none", borderRadius:8, cursor:"pointer", fontWeight:"bold"}}>INITIALIZE</button>
    </div>
  );

  return (
    <div>
      <header style={{borderBottom:"1px solid #1a1810", paddingBottom:15, marginBottom:20}}>
        <div style={{fontSize:10, color:"#c9a84c", letterSpacing:2}}>TURN {state.turn} | CLASSIFIED</div>
        <h1 style={{fontFamily:"'Playfair Display'", fontSize:28}}>THE OPEC CRISIS</h1>
      </header>

      {loading && <div style={{textAlign:"center", padding:20, fontFamily:"'JetBrains Mono'"}}>SYNCHRONIZING GLOBAL DATA...</div>}
      
      {!loading && phase === "game" && (
        <div>
          <h2 style={{color:"#e8d5b5", marginBottom:15}}>{turnData?.headline}</h2>
          <p style={{marginBottom:25, color:"#a09585"}}>{turnData?.briefing}</p>
          
          <div className="card">
            <SBar label="Saudi Relations" value={state.saudi} color="#4aad6a" />
            <SBar label="US Relations" value={state.us} color="#5a9ece" />
            <SBar label="Iran Threat Level" value={state.threat} color="#d45a5a" />
          </div>

          {turnData?.choices?.map((c,i)=>(
            <button key={i} className="btn" onClick={()=>handleChoice(c)}>
              <strong>{c.label}</strong>: {c.desc}
            </button>
          ))}
        </div>
      )}

      {!loading && phase === "reactions" && (
        <div>
          <h3 style={{color:"#c9a84c", marginBottom:15, fontSize:12, letterSpacing:1}}>INTELLIGENCE REPORTE: GLOBAL REACTIONS</h3>
          {reactions.map((r,i)=>(
            <div key={i} className="reaction-card">
              <span style={{fontSize:11, fontWeight:"bold", display:"block", color:"#e8d5b5"}}>{r.leader}</span>
              <span style={{fontStyle:"italic", fontSize:13, color:"#a09585"}}>"{r.text}"</span>
            </div>
          ))}
          <button onClick={startSim} style={{width:"100%", padding:15, marginTop:20, background:"#c9a84c", border:"none", borderRadius:10, fontWeight:"bold", cursor:"pointer"}}>PROCEED TO NEXT MONTH</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script></body></html>
