<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>THE OPEC CRISIS | GEMINI 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0a08;color:#e0d5c5;font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden}
  #app{max-width:760px;margin:0 auto;padding-bottom:100px}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{box-shadow:0 0 10px #c9a84c20}50%{box-shadow:0 0 25px #c9a84c40}}
  .btn-choice{display:block;width:100%;text-align:left;background:#12100d;border:1px solid #2a2520;border-radius:12px;padding:16px;cursor:pointer;margin-bottom:10px;transition:all .2s;color:inherit}
  .btn-choice:hover{border-color:#c9a84c;transform:translateY(-2px);background:#1a1814}
</style></head><body><div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

// Configuration for Gemini 3 Flash
const MODEL_ID = "gemini-3-flash-preview"; 
const API_URL = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions";

const LEADERS={
  uae:{name:"MBZ",flag:"🇦🇪"}, saudi:{name:"MBS",flag:"🇸🇦"}, usa:{name:"Donald Trump",flag:"🇺🇸"},
  iran:{name:"Pezeshkian",flag:"🇮🇷"}, opec:{name:"Al Ghais",flag:"🛢️"}, china:{name:"Xi Jinping",flag:"🇨🇳"}
};

const INIT={turn:0,phase:"key",price:78,uaeProduction:3.2,uaeInOpec:true,warActive:false,saudiRelation:65,usRelation:70,iranThreat:30,history:[],reactions:[]};

async function callGemini(prompt, apiKey){
  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: MODEL_ID,
      messages: [
        {role: "system", content: "You are a geopolitical game master. Return ONLY valid JSON."},
        {role: "user", content: prompt}
      ],
      response_format: { type: "json_object" }
    })
  });
  if(!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || "API Failure");
  }
  const data = await response.json();
  return JSON.parse(data.choices[0].message.content);
}

function SBar({label,value,color}){
  return (
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:"#8a8070",marginBottom:4,fontFamily:"'JetBrains Mono'"}}>{label}</div>
      <div style={{height:8,background:"#1a1610",borderRadius:4,overflow:"hidden"}}>
        <div style={{width:`${Math.min(value,100)}%`,height:"100%",background:color,transition:"width 1s"}} />
      </div>
    </div>
  );
}

function App(){
  const[state,setState]=useState(INIT);
  const[apiKey,setApiKey]=useState("");
  const[turnData,setTurnData]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);

  const startSim = async () => {
    setLoading(true); setError(null);
    try {
      const data = await callGemini(`Start Turn 1 for January 2026. Oil $78. Provide headline, briefing, and 3 choices.`, apiKey);
      setTurnData(data);
      setState(s=>({...s, phase:"briefing"}));
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const handleChoice = async (choice) => {
    setLoading(true);
    try {
      const rx = await callGemini(`UAE chose: ${choice.label}. Generate leader reactions.`, apiKey);
      setState(s=>({...s, turn: s.turn+1, reactions: rx.reactions || [], phase: "reactions"}));
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  if(state.phase === "key"){
    return (
      <div style={{padding:40,textAlign:"center",marginTop:100}}>
        <h2 style={{fontFamily:"'Playfair Display'",marginBottom:20}}>Enter Gemini API Key</h2>
        <input type="password" onChange={e=>setApiKey(e.target.value)} style={{padding:12,width:300,background:"#12100d",border:"1px solid #2a2520",color:"#fff",borderRadius:8}} />
        <button onClick={startSim} style={{marginLeft:10,padding:"12px 20px",background:"#c9a84c",border:"none",borderRadius:8,cursor:"pointer",fontWeight:"bold"}}>START</button>
        {error && <div style={{color:"#d45a5a",marginTop:20}}>{error}</div>}
      </div>
    );
  }

  return (
    <div style={{padding:20}}>
      <header style={{borderBottom:"1px solid #1a1810",paddingBottom:20,marginBottom:20}}>
        <div style={{fontSize:10,color:"#c9a84c",letterSpacing:2}}>CLASSIFIED UAE NSC</div>
        <h1 style={{fontFamily:"'Playfair Display'",fontSize:28}}>THE OPEC CRISIS</h1>
      </header>

      {loading ? (
        <div style={{textAlign:"center",padding:50,fontFamily:"'JetBrains Mono'"}}>DECRYPTING INTEL...</div>
      ) : state.phase === "briefing" ? (
        <div style={{animation:"slideUp 0.5s ease"}}>
          <h2 style={{fontSize:24,marginBottom:15,color:"#e8d5b5"}}>{turnData?.headline}</h2>
          <p style={{lineHeight:1.7,color:"#a09585",marginBottom:25}}>{turnData?.briefing}</p>
          <div style={{background:"#10120e",padding:20,borderRadius:12,marginBottom:20,border:"1px solid #1a2a1a"}}>
            <SBar label="Saudi Relations" value={state.saudiRelation} color="#4aad6a" />
            <SBar label="US Relations" value={state.usRelation} color="#5a9ece" />
            <SBar label="Iran Threat" value={state.iranThreat} color="#d45a5a" />
          </div>
          {turnData?.choices?.map((c,i)=>(
            <button key={i} className="btn-choice" onClick={()=>handleChoice(c)}>
              <strong>{c.label}</strong>: {c.desc}
            </button>
          ))}
        </div>
      ) : (
        <div style={{animation:"slideUp 0.5s ease"}}>
          <h3 style={{marginBottom:15,fontSize:14,color:"#c9a84c"}}>GLOBAL REACTIONS</h3>
          {state.reactions.map((r,i)=>(
            <div key={i} style={{background:"#141a18",padding:15,borderRadius:10,marginBottom:10,border:"1px solid #2a3a30"}}>
              <strong>{r.leader}</strong>: "{r.text}"
            </div>
          ))}
          <button onClick={startSim} style={{width:"100%",padding:15,background:"#c9a84c",border:"none",borderRadius:10,fontWeight:"bold",marginTop:20,cursor:"pointer"}}>CONTINUE TO NEXT TURN</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script></body></html>
